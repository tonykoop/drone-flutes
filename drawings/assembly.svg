  <text class="subtitle" x="60" y="370" text-anchor="start">Assembly notes</text>
  <text class="small" x="60" y="384" text-anchor="start">1. Insert chosen drone block tenon-first into foot socket. Slip-fit, do not glue.</text>
  <text class="small" x="60" y="396" text-anchor="start">2. Place bird block over window opening with bottom shoulder on top facet.</text>
  <text class="small" x="60" y="408" text-anchor="start">3. Tie bird in place with leather lacing through cord channels.</text>
  <text class="small" x="60" y="420" text-anchor="start">4. Verify flue gap 0.030–0.050". Seat bird if tone is breathy; shim if too thin.</text>
